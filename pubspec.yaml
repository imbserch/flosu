name: flosu
description: "An Osu! made in Flutter"
publish_to: 'none'
version: 0.3.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.2
  flutter_riverpod: ^3.1.0
  mime: ^2.0.0
  collection: ^1.19.1
  lzma: ^1.0.1
  crypto: ^3.0.7
  go_router: ^17.1.0
  shared_preferences: ^2.5.4
  image_fade: ^0.6.2
  flutter_soloud: ^4.0.0
  scrollable_positioned_list: ^0.3.8
  logger: ^2.7.0
  permission_handler: ^12.0.1
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  lints: ^6.1.0
  isar_community_generator: ^3.3.2
  build_runner: ^2.15.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/mods/
    - assets/samples/
    - assets/samples/DailyChallenge/
    - assets/samples/Gameplay/
    - assets/samples/Gameplay/Argon/
    - assets/samples/Gameplay/ArgonPro/
    - assets/samples/Intro/
    - assets/samples/Intro/Welcome/
    - assets/samples/Keyboard/
    - assets/samples/MedalSplash/
    - assets/samples/Menu/
    - assets/samples/Multiplayer/
    - assets/samples/Multiplayer/Matchmaking/
    - assets/samples/Multiplayer/Matchmaking/Cloud/
    - assets/samples/Multiplayer/Matchmaking/Ranked/
    - assets/samples/Multiplayer/Matchmaking/Ranked/Results/
    - assets/samples/Multiplayer/Matchmaking/Selection/
    - assets/samples/Results/
    - assets/samples/SongSelect/
    - assets/samples/UI/

  fonts:
      - family: Torus
        fonts:
          - asset: assets/fonts/Torus-Light.otf
          - asset: assets/fonts/Torus-Regular.otf
          - asset: assets/fonts/Torus-SemiBold.otf
          - asset: assets/fonts/Torus-Bold.otf
      - family: Venera
        fonts:
          - asset: assets/fonts/Venera-100.ttf
            weight: 100
          - asset: assets/fonts/Venera-300.ttf
            weight: 300
          - asset: assets/fonts/Venera-500.ttf
            weight: 500
          - asset: assets/fonts/Venera-700.ttf
            weight: 700
          - asset: assets/fonts/Venera-900.ttf
            weight: 900
